name: Discord Commit Notifier

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Prepare commit data
        shell: bash
        run: |
          set -euo pipefail

          HEAD_SHA="$(git rev-parse HEAD)"
          BASE_SHA="$(git rev-parse HEAD^ 2>/dev/null || echo 4b825dc642cb6eb9a060e54bf8d69288fbee4904)"

          echo "COMMIT_URL=https://github.com/${GITHUB_REPOSITORY}/commit/${HEAD_SHA}" >> "$GITHUB_ENV"
          echo "TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          echo "BRANCH=${GITHUB_REF#refs/heads/}" >> "$GITHUB_ENV"

          STATS="$(git diff --shortstat "$BASE_SHA" "$HEAD_SHA" || echo "No changes")"
          echo "STATS_TEXT=$STATS" >> "$GITHUB_ENV"

          EXT_LIST="$(
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" | awk '
              {
                split($NF,a,".")
                ext=(length(a)>1?a[length(a)]:"noext")
                count[ext]++
              }
              END {
                for(i in count)
                  print i " (" count[i] ")"
              }
            ' | sort | paste -sd ", " -
          )"

          [[ -z "$EXT_LIST" ]] && EXT_LIST="None"

          echo "FILE_TYPES=$EXT_LIST" >> "$GITHUB_ENV"

      - name: Send Discord Webhook
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        shell: bash
        run: |
          set -euo pipefail

          COMMIT_MSG="$(git log -1 --pretty=%B)"

          export COMMIT_MSG
          export CHUNK_LIMIT=3500

          mapfile -d '' MSG_CHUNKS < <(
            python3 << 'PY'
import os

msg=os.environ["COMMIT_MSG"]
limit=int(os.environ["CHUNK_LIMIT"])

if not msg:
    print("No commit message.", end="\0")
    raise SystemExit

i=0
while i<len(msg):
    part=msg[i:i+limit]
    if len(part)==limit:
        nl=part.rfind("\n")
        if nl!=-1:
            part=part[:nl+1]
    print(part,end="\0")
    i+=len(part)
PY
          )

          [[ ${#MSG_CHUNKS[@]} -eq 0 ]] && MSG_CHUNKS=("No commit message.")

          TOTAL=${#MSG_CHUNKS[@]}

          for ((i=0;i<TOTAL;i++)); do

            TITLE="🚀 [Goofy] New Commit"

            if (( TOTAL > 1 )); then
              TITLE="$TITLE ($((i+1))/$TOTAL)"
            fi

            PAYLOAD=$(jq -n \
              --arg title "$TITLE" \
              --arg msg "${MSG_CHUNKS[$i]}" \
              --arg url "$COMMIT_URL" \
              --arg branch "$BRANCH" \
              --arg stats "$STATS_TEXT" \
              --arg types "$FILE_TYPES" \
              --arg time "$TIMESTAMP" \
              '{
                username: "Goofy",
                avatar_url: "https://i.pinimg.com/1200x/92/41/92/924192b2cdbec6802e7fe4229e2e1bd9.jpg",
                embeds: [
                  {
                    title: $title,
                    description: "📝 **Summary**\n" + $msg + "\n\n[View Commit](" + $url + ")",
                    color: 5763719,
                    timestamp: $time,
                    fields: [
                      {
                        name: "Repository",
                        value: "Goofy",
                        inline: true
                      },
                      {
                        name: "Author",
                        value: "Goofy",
                        inline: true
                      },
                      {
                        name: "Branch",
                        value: $branch,
                        inline: true
                      },
                      {
                        name: "📊 Changes",
                        value: $stats,
                        inline: false
                      },
                      {
                        name: "📂 File Types",
                        value: $types,
                        inline: false
                      }
                    ],
                    footer: {
                      text: "Goofy • GitHub Actions"
                    }
                  }
                ]
              }')

            curl -sS \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "$WEBHOOK"

          done
